version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: wb_aggregator
      POSTGRES_USER: ${POSTGRES_USER:-socialist}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-revolution2023}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U socialist -d wb_aggregator"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend-network

  backend:
    build:
      context: ./admin/backend
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBAPP_URL: ${TELEGRAM_WEBAPP_URL}
      DEVELOPMENT_MODE: "False"
      BOT_API_URL: http://bot:8080
      SUPER_ADMIN_IDS: ${SUPER_ADMIN_IDS}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - backend-network
      - frontend-network

  frontend:
    build:
      context: ./admin/frontend
    restart: always
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN_URL=${DOMAIN_URL}
      - API_URL=${API_URL}
      - WEBAPP_URL=${WEBAPP_URL}
    depends_on:
      - backend
    networks:
      - frontend-network

  bot:
    build: ./admin/bot
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      WEBAPP_URL: ${TELEGRAM_WEBAPP_URL}
      SUPER_ADMIN_IDS: ${SUPER_ADMIN_IDS}
    networks:
      - backend-network

volumes:
  postgres_data:
  backend-data:
  certbot-data:
  certbot-www:

networks:
  backend-network:
  frontend-network:
  app-network:
    driver: bridge