services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend-network
    labels:
      - "prometheus.scrape=true"
      - "prometheus.port=9187"

  backend:
    build: ./admin/backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBAPP_URL: ${TELEGRAM_WEBAPP_URL}
      BOT_API_URL: ${BOT_API_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      DEVELOPMENT_MODE: ${DEVELOPMENT_MODE}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend-network
      - frontend-network
      - monitoring-network
    labels:
      - "prometheus.scrape=true"
      - "prometheus.port=8000"

  frontend:
    build: ./admin/frontend
    environment:
      API_URL: ${API_URL}
    volumes:
      # Монтируем сертификаты из хост-системы
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - frontend-network
      - monitoring-network
    labels:
      - "prometheus.scrape=true"
      - "prometheus.port=80"

  bot:
    build: ./admin/bot
    environment:
      BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      WEBAPP_URL: ${TELEGRAM_WEBAPP_URL}
      SUPER_ADMIN_IDS: ${SUPER_ADMIN_IDS}
      CORS_ORIGINS: ${CORS_ORIGINS}
    networks:
      - backend-network
      - monitoring-network
    labels:
      - "prometheus.scrape=true"
      - "prometheus.port=8080"

  # Мониторинг системы
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    command:
      - '--collector.systemd'
      - '--collector.processes'
      - '--collector.cpu'
      - '--collector.meminfo'
      - '--collector.filesystem'
    ports:
      - "9100:9100"
    volumes:
      - /:/host:ro,rslave
      - /sys:/host/sys:ro
      - /proc:/host/proc:ro
    networks:
      - monitoring-network
    labels:
      - "prometheus.scrape=true"
      - "prometheus.port=9100"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - monitoring-network
    depends_on:
      - node-exporter
      - cadvisor

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-piechart-panel
    networks:
      - monitoring-network
    depends_on:
      - prometheus
      - loki

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    ports:
      - "8081:8080"  # Изменен порт, чтобы не конфликтовать с ботом
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - monitoring-network
    labels:
      - "prometheus.scrape=true"
      - "prometheus.port=8080"

  # Логирование
  loki:
    image: grafana/loki:2.9.4
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
      - ./monitoring/loki/loki-config.yaml:/etc/loki/config.yaml
    networks:
      - monitoring-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  promtail:
    image: grafana/promtail:2.9.4
    container_name: promtail
    restart: unless-stopped
    volumes:
      - /var/log:/var/log
      - ./monitoring/promtail/promtail-config.yaml:/etc/promtail/config.yml
    networks:
      - monitoring-network
    depends_on:
      loki:
        condition: service_healthy

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  backend-network:
  frontend-network:
  monitoring-network:
    driver: bridge 